services:
  mysql:
    image: mysql:8.0
    command: mysqld --default-authentication-plugin=mysql_native_password
    networks:
      - overlay
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: database
      MYSQL_USER: username
      MYSQL_PASSWORD: password
  game:
    depends_on:
      - mysql
    restart: on-failure
    image: golem:latest
    networks:
      - overlay
    ports:
      - "4000:4000"
      - "40000:40000"
      - "6060:6060"
      - "9000:9000"
    volumes:
      - ./etc:/app/etc
      - ./scripts:/app/scripts

networks:
  overlay:

volumes:
  db_data: {}
  etc:
